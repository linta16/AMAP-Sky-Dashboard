name: Bake Data into Dashboard

on:
  push:
    paths:
      - 'data/**'

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Bake data into dashboard
        run: python bake.py

      - name: Commit updated dashboard
        run: |
          git config user.name "AMAP Bot"
          git config user.email "amap-bot@noreply.com"
          git add index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "Auto-refresh: bake latest data $(date +'%Y-%m-%d %H:%M')" && git push origin main --force-with-lease)
